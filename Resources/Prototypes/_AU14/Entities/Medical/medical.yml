#new medicines
- type: reagent
  parent: [ CMReagentMedicine, Dexalin ]
  id: AU14Albuterol
  name: reagent-name-albuterol
  desc: reagent-desc-albuterol
  color: "#1f83a7"
  overdose: 35
  metabolisms:
    Medicine:
      metabolismRate: 0.04
      effects:
      - !type:EqualHealthChange
        damage:
        - Airloss: -4
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 30
        damage:
          groups:
            Toxin: 0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 50
        damage:
          groups:
            Brute: 1
            Toxin: 2

- type: reagent
  parent: [ CMReagentMedicine, DexalinPlus ]
  id: AU14Naloxone
  name: reagent-name-cmnaloxone
  desc: reagent-desc-cmnaloxone
  color: "#a3adbf"
  overdose: 200
  metabolisms:
    Medicine:
      metabolismRate: 0.02
      effects:
      - !type:RemoveDamage
        group: Toxin
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 15
        damage:
          groups:
            Toxin: 0.75
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 25
        damage:
          groups:
            Brute: 1.5
            Toxin: 3

#injectors
- type: entity
