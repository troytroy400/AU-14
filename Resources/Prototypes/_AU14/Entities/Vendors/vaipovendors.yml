  description: >-
    An automated medical rack, hooked up to a compact stock of trauma supplies for Vanguard Arrow Incorporated mercenary medics used by their Primary Operations branch.
    Standard issue for corpsmen aboard naval vessels, outposts and colonies where casualties arrive faster than reinforcements.
    Designed for rapid reconstitution of combat medics following cryogenic hypersleep or emergency call-up.

